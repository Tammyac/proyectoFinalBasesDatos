<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cita - Guanavet</title>

    <style>
        body{font-family:Arial,sans-serif;background:#f4f8f7;margin:0;}
        header{background:#2c7a7b;color:white;padding:20px;text-align:center;}
        .container{width:500px;margin:40px auto;background:white;padding:30px;border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,.12);}
        h2{text-align:center;color:#2c7a7b;}
        label{font-weight:bold;display:block;margin-top:10px;}
        input,select,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;}
        textarea{resize:none;height:80px;}
        .alerta{background:#ffdede;color:#b00020;padding:12px;border-radius:8px;margin-bottom:15px;text-align:center;font-weight:bold;}
        .botones{display:flex;gap:10px;margin-top:20px;}
        button{flex:1;padding:12px;background:#2c7a7b;color:white;border:none;border-radius:8px;cursor:pointer;}
        .volver{flex:1;background:#777;color:white;text-align:center;padding:12px;border-radius:8px;text-decoration:none;}
    </style>
</head>

<body>

<header>
    <h1>Sistema Veterinario Guanavet</h1>
</header>

<div class="container">

    <h2>Formulario de Cita</h2>

    <div class="alerta" th:if="${error}">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/citas/guardar}" th:object="${cita}" method="post">

        <input type="hidden" th:field="*{idCita}">

        <label>Cliente</label>
        <select id="cliente" th:field="*{cliente}" onchange="cargarMascotas()" required>
            <option value="">Seleccione un cliente</option>
            <option th:each="cliente : ${clientes}"
                    th:value="${cliente.idCliente}"
                    th:text="${cliente.nombre}">
            </option>
        </select>

        <label>Mascota</label>
        <select id="mascota" th:field="*{mascota}" required>
            <option value="">Seleccione una mascota</option>

            <option th:if="${cita.mascota != null}"
                    th:value="${cita.mascota.idMascota}"
                    th:text="${cita.mascota.nombre}"
                    selected>
            </option>
        </select>

        <label>Veterinario</label>
        <select th:field="*{veterinario}" required>
            <option value="">Seleccione un veterinario</option>
            <option th:each="v : ${veterinarios}"
                    th:value="${v.idVeterinario}"
                    th:text="${v.nombre}">
            </option>
        </select>

        <label>Fecha</label>
        <input type="date" th:field="*{fecha}" required>

        <label>Hora</label>
        <input type="time" th:field="*{hora}" required>

        <label>Motivo</label>
        <textarea th:field="*{motivo}" placeholder="Ejemplo: revisión general, vacuna, emergencia..." required></textarea>

        <label>Estado</label>
        <select th:field="*{estado}" required>
            <option value="Pendiente">Pendiente</option>
            <option value="Confirmada">Confirmada</option>
            <option value="En proceso">En proceso</option>
            <option value="Atendida">Atendida</option>
            <option value="Cancelada">Cancelada</option>
            <option value="No asistió">No asistió</option>
        </select>

        <div class="botones">
            <button type="submit">Guardar</button>
            <a class="volver" href="/citas">Volver</a>
        </div>

    </form>

</div>

<script>
    function cargarMascotas(){
        let clienteId = document.getElementById("cliente").value;
        let selectMascota = document.getElementById("mascota");

        selectMascota.innerHTML = '<option value="">Seleccione una mascota</option>';

        if(clienteId === ""){
            return;
        }

        fetch("/mascotas/cliente/" + clienteId)
            .then(response => response.json())
            .then(data => {
                data.forEach(mascota => {
                    selectMascota.innerHTML +=
                        `<option value="${mascota.idMascota}">${mascota.nombre}</option>`;
                });
            });
    }
</script>

</body>
</html>
