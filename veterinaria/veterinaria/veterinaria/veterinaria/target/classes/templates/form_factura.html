<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Factura - Guanavet</title>

    <style>
        body{font-family:Arial,sans-serif;background:#f4f8f7;margin:0;}
        header{background:#2c7a7b;color:white;padding:35px;text-align:center;}
        .container{width:85%;margin:35px auto;background:white;padding:30px;border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,.12);}
        h2{text-align:center;color:#2c7a7b;}
        label{font-weight:bold;display:block;margin-top:12px;}
        input,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;}
        table{width:100%;border-collapse:collapse;margin-top:20px;}
        th,td{padding:12px;text-align:center;border-bottom:1px solid #ddd;}
        th{background:#e0f2f1;color:#225e5f;}
        .btn{background:#2c7a7b;color:white;padding:12px 18px;border:none;border-radius:8px;text-decoration:none;cursor:pointer;font-weight:bold;}
        .volver{background:#777;color:white;padding:12px 18px;border-radius:8px;text-decoration:none;font-weight:bold;}
        .eliminar{background:#e53e3e;color:white;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;}
        .total{text-align:right;font-size:24px;color:#2c7a7b;font-weight:bold;margin-top:20px;}
        .botones{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
    </style>
</head>

<body>

<header>
    <h1>Sistema Veterinario Guanavet</h1>
    <p>Facturación</p>
</header>

<div class="container">

    <h2>Nueva Factura</h2>

    <form th:action="@{/facturas/guardar}" th:object="${factura}" method="post">

        <label>Cliente</label>
        <select th:field="*{cliente}" required>
            <option value="">Seleccione un cliente</option>
            <option th:each="c : ${clientes}"
                    th:value="${c.idCliente}"
                    th:text="${c.nombre}">
            </option>
        </select>

        <label>Fecha</label>
        <input type="date" th:field="*{fecha}" required>

        <table id="tablaDetalle">
            <thead>
            <tr>
                <th>Tipo</th>
                <th>Producto / Servicio</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Subtotal</th>
                <th>Acción</th>
            </tr>
            </thead>

            <tbody id="detalleBody">
            </tbody>
        </table>

        <br>

        <button type="button" class="btn" onclick="agregarProducto()">Agregar producto</button>
        <button type="button" class="btn" onclick="agregarServicio()">Agregar servicio</button>

        <div class="total">
            Total: ₡<span id="totalFactura">0</span>
        </div>

        <div class="botones">
            <button type="submit" class="btn">Guardar factura</button>
            <a class="volver" href="/facturas">Volver</a>
        </div>

    </form>

</div>

<script th:inline="javascript">

    let productos = [[${productos}]];
    let servicios = [[${servicios}]];

    function agregarProducto() {
        let fila = document.createElement("tr");

        let opciones = "";
        productos.forEach(p => {
            opciones += `<option value="${p.idProducto}" data-precio="${p.precio}">
                            ${p.nombre}
                         </option>`;
        });

        fila.innerHTML = `
            <td>
                PRODUCTO
                <input type="hidden" name="tipo" value="PRODUCTO">
            </td>

            <td>
                <select name="productoId" onchange="actualizarPrecio(this)" required>
                    ${opciones}
                </select>
            </td>

            <td>
                <input type="number" name="cantidad" value="1" min="1" onchange="calcularTotal()" required>
            </td>

            <td class="precio">0</td>

            <td class="subtotal">0</td>

            <td>
                <button type="button" class="eliminar" onclick="eliminarFila(this)">Eliminar</button>
            </td>
        `;

        document.getElementById("detalleBody").appendChild(fila);

        actualizarPrecio(fila.querySelector("select"));
    }

    function agregarServicio() {
        let fila = document.createElement("tr");

        let opciones = "";
        servicios.forEach(s => {
            opciones += `<option value="${s.idServicio}" data-precio="${s.precio}">
                            ${s.nombre}
                         </option>`;
        });

        fila.innerHTML = `
            <td>
                SERVICIO
                <input type="hidden" name="tipo" value="SERVICIO">
            </td>

            <td>
                <select name="servicioId" onchange="actualizarPrecio(this)" required>
                    ${opciones}
                </select>
            </td>

            <td>
                <input type="number" name="cantidad" value="1" min="1" onchange="calcularTotal()" required>
            </td>

            <td class="precio">0</td>

            <td class="subtotal">0</td>

            <td>
                <button type="button" class="eliminar" onclick="eliminarFila(this)">Eliminar</button>
            </td>
        `;

        document.getElementById("detalleBody").appendChild(fila);

        actualizarPrecio(fila.querySelector("select"));
    }

    function actualizarPrecio(select) {
        let precio = select.options[select.selectedIndex].getAttribute("data-precio");
        let fila = select.closest("tr");

        fila.querySelector(".precio").innerText = precio;

        calcularTotal();
    }

    function calcularTotal() {
        let total = 0;

        document.querySelectorAll("#detalleBody tr").forEach(fila => {
            let precio = parseFloat(fila.querySelector(".precio").innerText);
            let cantidad = parseInt(fila.querySelector("input[name='cantidad']").value);

            let subtotal = precio * cantidad;

            fila.querySelector(".subtotal").innerText = subtotal;

            total += subtotal;
        });

        document.getElementById("totalFactura").innerText = total;
    }

    function eliminarFila(boton) {
        boton.closest("tr").remove();
        calcularTotal();
    }

</script>

</body>
</html>
