<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Servicio - Guanavet</title>

    <style>
        body{font-family:Arial,sans-serif;background:#f4f8f7;margin:0;}
        header{background:#2c7a7b;color:white;padding:35px;text-align:center;}
        .container{width:500px;margin:40px auto;background:white;padding:30px;border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,.12);}
        h2{text-align:center;color:#2c7a7b;}
        label{font-weight:bold;display:block;margin-top:12px;}
        input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;}
        textarea{resize:none;height:90px;}
        .botones{display:flex;gap:10px;margin-top:20px;}
        button{flex:1;padding:12px;background:#2c7a7b;color:white;border:none;border-radius:8px;cursor:pointer;}
        .volver{flex:1;background:#777;color:white;text-align:center;padding:12px;border-radius:8px;text-decoration:none;}
    </style>
</head>

<body>

<header>
    <h1>Sistema Veterinario Guanavet</h1>
</header>

<div class="container">

    <h2>Formulario de Servicio</h2>

    <form th:action="@{/servicios/guardar}" th:object="${servicio}" method="post">

        <input type="hidden" th:field="*{idServicio}">

        <label>Nombre del servicio</label>
        <input type="text" th:field="*{nombre}" placeholder="Ej: Consulta médica" required>

        <label>Descripción</label>
        <textarea th:field="*{descripcion}" placeholder="Ej: Revisión general de la mascota" required></textarea>

        <label>Precio</label>
        <input type="number" step="0.01" th:field="*{precio}" placeholder="Ej: 15000" required>

        <div class="botones">
            <button type="submit">Guardar</button>
            <a class="volver" href="/servicios">Volver</a>
        </div>

    </form>

</div>

</body>
</html>
