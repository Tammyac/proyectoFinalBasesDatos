<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Mascota - Guanavet</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f8f7;
            margin:0;
        }

        header{
            background:#2c7a7b;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{

            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,.12);

        }

        h2{
            text-align:center;
            color:#2c7a7b;
        }

        label{
            font-weight:bold;
        }

        input,select{

            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;

        }

        .botones{

            display:flex;
            gap:10px;
            margin-top:20px;

        }

        button{

            flex:1;
            padding:12px;
            background:#2c7a7b;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;

        }

        button:hover{
            background:#225e5f;
        }

        .volver{

            flex:1;
            background:#777;
            color:white;
            text-align:center;
            padding:12px;
            border-radius:8px;
            text-decoration:none;

        }

    </style>

</head>

<body>

<header>
    <h1>Sistema Veterinario Guanavet</h1>
</header>

<div class="container">

    <h2 th:if="${mascota.idMascota == null}">
        Nueva Mascota
    </h2>

    <h2 th:unless="${mascota.idMascota == null}">
        Editar Mascota
    </h2>


    <form
            th:action="@{/mascotas/guardar}"
            th:object="${mascota}"
            method="post">

        <!-- IMPORTANTE -->
        <input
                type="hidden"
                th:field="*{idMascota}">


        <label>Nombre</label>

        <input
                type="text"
                th:field="*{nombre}"
                placeholder="Nombre"
                required>


        <label>Especie</label>

        <input
                type="text"
                th:field="*{especie}"
                placeholder="Especie"
                required>


        <label>Raza</label>

        <input
                type="text"
                th:field="*{raza}"
                placeholder="Raza">


        <label>Peso (kg)</label>

        <input
                type="number"
                step="0.1"
                th:field="*{peso}"
                placeholder="Peso">


        <label>Dueño</label>

        <select th:field="*{cliente}" required>

            <option value="">
                Seleccione un dueño
            </option>

            <option
                    th:each="cliente : ${clientes}"
                    th:value="${cliente.idCliente}"
                    th:text="${cliente.nombre}">
            </option>

        </select>


        <div class="botones">

            <button type="submit">
                Guardar
            </button>

            <a
                    class="volver"
                    href="/mascotas">

                Volver

            </a>

        </div>

    </form>

</div>

</body>
</html>
