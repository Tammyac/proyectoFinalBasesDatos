<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Facturas - Guanavet</title>

    <style>
        body{font-family:Arial,sans-serif;background:#f4f8f7;margin:0;}
        header{background:#2c7a7b;color:white;padding:35px;text-align:center;}
        .container{width:90%;margin:35px auto;background:white;padding:25px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.12);}
        .btn{background:#2c7a7b;color:white;padding:10px 15px;text-decoration:none;border-radius:8px;margin-right:10px;display:inline-block;}
        table{width:100%;border-collapse:collapse;margin-top:20px;}
        th,td{padding:12px;text-align:center;border-bottom:1px solid #ddd;}
        th{background:#e0f2f1;color:#225e5f;}
        .eliminar{background:#e53e3e;color:white;padding:8px 12px;border-radius:6px;text-decoration:none;}
    </style>
</head>

<body>

<header>
    <h1>Sistema Veterinario Guanavet</h1>
    <p>Facturación</p>
</header>

<div class="container">

    <a class="btn" href="/facturas/nuevo">Nueva factura</a>
    <a class="btn" href="/menu">Volver menú</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="f : ${facturas}">
            <td th:text="${f.idFactura}"></td>
            <td th:text="${f.cliente.nombre}"></td>
            <td th:text="${f.fecha}"></td>
            <td th:text="${'₡' + f.total}"></td>
            <td>
                <a class="eliminar"
                   th:href="@{/facturas/eliminar/{id}(id=${f.idFactura})}"
                   onclick="return confirm('¿Eliminar factura?')">
                    Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
