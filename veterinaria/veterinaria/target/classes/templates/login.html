<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Guanavet</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#e8f5f3;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
            margin:0;
        }

        .login-box{

            background:white;

            width:380px;

            padding:35px;

            border-radius:15px;

            box-shadow:0 4px 12px rgba(0,0,0,.15);

            text-align:center;
        }

        h2{
            color:#2c7a7b;
            margin-bottom:5px;
        }

        .subtitulo{
            color:#666;
            margin-bottom:25px;
        }

        input{

            width:92%;

            padding:12px;

            margin:10px 0;

            border:1px solid #ccc;

            border-radius:8px;

        }

        button{

            width:98%;

            padding:12px;

            border:none;

            border-radius:8px;

            cursor:pointer;

            background:#2c7a7b;

            color:white;

            margin-top:10px;

            font-size:15px;

        }

        button:hover{

            background:#225e5f;

        }

        .error{

            color:red;
            margin-top:15px;

        }

        .exito{

            color:green;
            margin-top:15px;

        }

        .crear{

            display:block;

            margin-top:18px;

            color:#2c7a7b;

            text-decoration:none;

            font-weight:bold;

        }

        .crear:hover{

            text-decoration:underline;

        }

    </style>

</head>

<body>

<div class="login-box"><!DOCTYPE html>
    <html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Login - Guanavet</title>

        <style>

            body{
                font-family:Arial,sans-serif;
                background:#e8f5f3;

                display:flex;
                justify-content:center;
                align-items:center;

                height:100vh;
                margin:0;
            }

            .login-box{

                background:white;

                width:380px;

                padding:35px;

                border-radius:15px;

                box-shadow:0 4px 12px rgba(0,0,0,.15);

                text-align:center;
            }

            h2{
                color:#2c7a7b;
                margin-bottom:5px;
            }

            .subtitulo{
                color:#666;
                margin-bottom:25px;
            }

            input{

                width:92%;

                padding:12px;

                margin:10px 0;

                border:1px solid #ccc;

                border-radius:8px;

            }

            button{

                width:98%;

                padding:12px;

                border:none;

                border-radius:8px;

                cursor:pointer;

                background:#2c7a7b;

                color:white;

                margin-top:10px;

                font-size:15px;

            }

            button:hover{

                background:#225e5f;

            }

            .error{

                color:red;
                margin-top:15px;

            }

            .exito{

                color:green;
                margin-top:15px;

            }

            .crear{

                display:block;

                margin-top:18px;

                color:#2c7a7b;

                text-decoration:none;

                font-weight:bold;

            }

            .crear:hover{

                text-decoration:underline;

            }

        </style>

    </head>

    <body>

    <div class="login-box">

        <h2>Guanavet</h2>

        <p class="subtitulo">
            Sistema de Gestión Veterinaria
        </p>


        <form action="/login" method="post">

            <input
                    type="email"
                    name="correo"
                    placeholder="Correo electrónico"
                    required>


            <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    required>


            <button type="submit">

                Ingresar

            </button>

        </form>


        <p
                class="error"
                th:if="${param.error}">

            Correo o contraseña incorrectos

        </p>


        <p
                class="exito"
                th:if="${param.registrado}">

            Usuario creado correctamente

        </p>


        <a
                class="crear"
                href="/registro">

            Crear nuevo usuario

        </a>

    </div>

    </body>
    </html></div>

</body>
</html>
